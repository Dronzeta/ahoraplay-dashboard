name: Update Social Media Metrics Daily

on:
  schedule:
    # 11:00 UTC es igual a las 08:00 AM en Argentina (UTC-3)
    # Se ejecuta todos los días (*)
    - cron: '0 11 * * *'
  workflow_dispatch: # Esto te permite darle al botón "Run" manualmente si quieres

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/set-up-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests # Solo necesitamos requests para el motor

    - name: Run data engine
      env:
        METRICOOL_TOKEN: ${{ secrets.METRICOOL_TOKEN }}
      run: python data_engine.py

    - name: Commit and push if data changed
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add metricool_data.json
        # Solo sube el cambio si el archivo JSON cambió realmente
        git diff --quiet && git diff --staged --quiet || (git commit -m "Daily Metrics Update: $(date)" && git push)
