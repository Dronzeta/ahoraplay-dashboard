name: Update Social Media Metrics Daily

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4 # <-- AQUÍ ESTABA EL ERROR, CORREGIDO DE set-up-python A setup-python
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run data engine
      env:
        METRICOOL_TOKEN: ${{ secrets.METRICOOL_TOKEN }}
      run: python data_engine.py

      - name: Commit and push if data changed
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add .  # <-- USAR EL PUNTO PARA AÑADIR TODO LO QUE HAYA CAMBIADO
        git commit -m "Daily Metrics Update: $(date)" || echo "No changes to commit"
        git push
